apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ios-plus-staging

resources:
  - ../../base/namespace.yaml
  - ../../base/configmap.yaml
  - ../../base/api-gateway.yaml
  - ../../base/cloudsql-proxy.yaml

images:
  - name: api-gateway
    newName: api-gateway
    newTag: staging-latest
  - name: canonical-layer
    newName: canonical-layer
    newTag: staging-latest
  - name: ml-persistence
    newName: ml-persistence
    newTag: staging-latest
  - name: ml-transcript-nlp
    newName: ml-transcript-nlp
    newTag: staging-latest

replicas:
  - name: api-gateway
    count: 2

patches:
  - target:
      kind: Deployment
      name: api-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: staging
