apiVersion: batch/v1
kind: Job
metadata:
  name: flyway-migrate
  namespace: trust-model
  labels:
    app: flyway
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: k8s-cloudsql-proxy
      containers:
        - name: flyway
          image: flyway/flyway:10
          command:
            - "flyway"
            - "migrate"
            - "-url=jdbc:postgresql://127.0.0.1:5432/smepro"
            - "-user=smepro"
            - "-password=${DB_PASSWORD}"
            - "-locations=filesystem:/flyway/sql"
            - "-baselineOnMigrate=true"
            - "-validateOnMigrate=true"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-password
                  key: password
          volumeMounts:
            - name: migrations
              mountPath: /flyway/sql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloudsql-docker/gce-proxy:1.33.0
          command:
            - "/cloud_sql_proxy"
            - "-instances=smepro-cos-prod:us-central1:smepro-cos-postgres-production=tcp:5432"
            - "-credential_file=/secrets/service_account.json"
          volumeMounts:
            - name: service-account-key
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsUser: 2
            allowPrivilegeEscalation: false
      volumes:
        - name: migrations
          configMap:
            name: flyway-migrations
        - name: service-account-key
          secret:
            secretName: cloudsql-service-account
