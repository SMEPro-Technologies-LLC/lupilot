name: CI — SMEPro COS on GCP

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REGISTRY: ${{ secrets.GCP_ARTIFACT_REGISTRY }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd backend/api-gateway && npm ci

      - name: Lint TypeScript
        run: |
          npx eslint . --ext .ts,.tsx
          cd backend/api-gateway && npx eslint . --ext .ts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint Python
        run: |
          pip install flake8 pylint
          flake8 backend/connectors/ ml/
          pylint backend/connectors/ ml/ --disable=all --enable=E,F

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Unit Tests — Backend
        run: |
          cd backend/api-gateway
          npm ci
          npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Unit Tests — Python
        run: |
          pip install -r requirements-dev.txt
          pytest backend/connectors/ ml/ --cov --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker images
        run: |
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/api-gateway:${{ github.sha }} backend/api-gateway/
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/canonical-layer:${{ github.sha }} backend/services/canonical-layer/
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/ml-persistence:${{ github.sha }} ml/jobs/persistence/
          docker build -t ${{ env.ARTIFACT_REGISTRY }}/ml-transcript-nlp:${{ github.sha }} ml/jobs/transcript-nlp/

      - name: Push Docker images
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/api-gateway:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/canonical-layer:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/ml-persistence:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/ml-transcript-nlp:${{ github.sha }}

      - name: Tag as latest
        run: |
          docker tag ${{ env.ARTIFACT_REGISTRY }}/api-gateway:${{ github.sha }} ${{ env.ARTIFACT_REGISTRY }}/api-gateway:latest
          docker push ${{ env.ARTIFACT_REGISTRY }}/api-gateway:latest

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Trivy Scan — Docker images
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ARTIFACT_REGISTRY }}/api-gateway:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
